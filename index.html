<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChaitrAi - Ultimate AI App Builder</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM (UMD) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #52525b; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

</head>
<body class="bg-zinc-950 text-white overflow-hidden h-screen w-screen selection:bg-green-500/30 font-sans">
  
  <div id="root" class="h-full w-full"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ==========================================
    // GEMINI 2.5 API INTEGRATION (LIVE)
    // ==========================================
    const apiKey = ""; // The environment securely injects the key at runtime

    const callGemini = async (prompt, systemInstruction = null) => {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
      
      const payload = {
        contents: [{ parts: [{ text: prompt }] }]
      };
      
      if (systemInstruction) {
        payload.systemInstruction = { parts: [{ text: systemInstruction }] };
      }

      // Exponential Backoff implementation
      let retries = 5;
      let delay = 1000;
      
      while (retries > 0) {
        try {
          const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          
          if (!res.ok) throw new Error(`HTTP Error: ${res.status}`);
          
          const data = await res.json();
          return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
        } catch (err) {
          retries--;
          if (retries === 0) throw err;
          await new Promise(resolve => setTimeout(resolve, delay));
          delay *= 2;
        }
      }
    };

    // ==========================================
    // UI ICONS
    // ==========================================
    const Icon = ({ path, className = "w-5 h-5", viewBox="0 0 24 24", fill="none", stroke="currentColor", strokeWidth="2" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox={viewBox} fill={fill} stroke={stroke} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>{path}</svg>
    );

    const Icons = {
      Menu: (p) => <Icon {...p} path={<><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></>} />,
      Plus: (p) => <Icon {...p} path={<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>} />,
      MessageSquare: (p) => <Icon {...p} path={<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>} />,
      PanelRightOpen: (p) => <Icon {...p} path={<><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><path d="M15 3v18"/><path d="m10 15-3-3 3-3"/></>} />,
      PanelRightClose: (p) => <Icon {...p} path={<><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><path d="M15 3v18"/><path d="m8 9 3 3-3 3"/></>} />,
      Zap: (p) => <Icon {...p} path={<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>} />,
      Brain: (p) => <Icon {...p} path={<><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/></>} />,
      Globe: (p) => <Icon {...p} path={<><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></>} />,
      Send: (p) => <Icon {...p} path={<><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></>} />,
      Terminal: (p) => <Icon {...p} path={<><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></>} />,
      Code2: (p) => <Icon {...p} path={<><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></>} />,
      Play: (p) => <Icon {...p} path={<polygon points="5 3 19 12 5 21 5 3"/>} />,
      X: (p) => <Icon {...p} path={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>} />,
      FileDown: (p) => <Icon {...p} path={<><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="M12 18v-6"/><path d="m9 15 3 3 3-3"/></>} />,
      Loader: (p) => <Icon {...p} className={`${p.className} animate-spin`} path={<path d="M21 12a9 9 0 1 1-6.219-8.56"/>} />,
      Cloud: (p) => <Icon {...p} path={<path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/>} />,
      Sparkles: (p) => <Icon {...p} path={<path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>} />,
      Paperclip: (p) => <Icon {...p} path={<path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/>} />,
      FileIcon: (p) => <Icon {...p} path={<><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></>} />
    };

    // ==========================================
    // LOGO COMPONENT
    // ==========================================
    const ChaitrAiLogo = ({ size = 'md' }) => {
      const dimensions = size === 'sm' ? 'w-8 h-8' : size === 'lg' ? 'w-16 h-16' : 'w-10 h-10';
      const textClass = size === 'sm' ? 'text-sm' : size === 'lg' ? 'text-3xl' : 'text-xl';

      return (
        <div className={`relative ${dimensions} bg-black rounded-lg flex items-center justify-center overflow-hidden border border-zinc-800 shadow-[0_0_15px_rgba(255,255,255,0.05)] flex-shrink-0`}>
          <svg viewBox="0 0 100 100" className="absolute inset-0 w-full h-full opacity-70">
            <circle cx="50" cy="50" r="38" fill="none" stroke="#4ade80" strokeWidth="1.5" strokeDasharray="60 30" strokeOpacity="0.8">
              <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" repeatCount="indefinite" />
            </circle>
            <circle cx="50" cy="50" r="28" fill="none" stroke="#60a5fa" strokeWidth="1.5" strokeDasharray="40 20" strokeOpacity="0.6">
              <animateTransform attributeName="transform" type="rotate" from="360 50 50" to="0 50 50" dur="7s" repeatCount="indefinite" />
            </circle>
            <circle cx="50" cy="50" r="18" fill="none" stroke="#a78bfa" strokeWidth="1" strokeDasharray="20 10" strokeOpacity="0.4">
              <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="4s" repeatCount="indefinite" />
            </circle>
          </svg>
          <span className={`relative z-10 font-black text-white tracking-tighter ${textClass} drop-shadow-md`}>CA</span>
        </div>
      );
    };

    // ==========================================
    // MAIN APP COMPONENT
    // ==========================================
    const App = () => {
      const [workspaces, setWorkspaces] = useState([{ id: '1', title: 'New App Project', messages: [] }]);
      const [currentWorkspaceId, setCurrentWorkspaceId] = useState('1');
      
      const [isSidebarOpen, setIsSidebarOpen] = useState(window.innerWidth > 768);
      const [isArtifactOpen, setIsArtifactOpen] = useState(false);
      const [artifactTab, setArtifactTab] = useState('preview');
      const [activeCode, setActiveCode] = useState('');
      const [inputText, setInputText] = useState('');
      const [aiMode, setAiMode] = useState('web');
      
      const [isGenerating, setIsGenerating] = useState(false);
      const [isEnhancing, setIsEnhancing] = useState(false);
      const [isExplaining, setIsExplaining] = useState(false);
      const [terminalLogs, setTerminalLogs] = useState([]);
      const [isDragging, setIsDragging] = useState(false);
      const [attachments, setAttachments] = useState([]);
      const fileInputRef = useRef(null);

      const messagesEndRef = useRef(null);
      const currentWorkspace = workspaces.find(w => w.id === currentWorkspaceId);
      const messages = currentWorkspace?.messages || [];

      useEffect(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [messages, terminalLogs]);

      const handleCreateWorkspace = () => {
        const newId = Date.now().toString();
        setWorkspaces(prev => [{ id: newId, title: 'New Project', messages: [] }, ...prev]);
        setCurrentWorkspaceId(newId);
        setIsArtifactOpen(false);
        setActiveCode('');
        if (window.innerWidth < 768) setIsSidebarOpen(false);
      };

      const addTerminalLog = (msg) => {
        setTerminalLogs(prev => [...prev, `[${new Date().toLocaleTimeString()}] ${msg}`]);
      };

      // ✨ LIVE Enhance Prompt
      const handleEnhancePrompt = async () => {
        if (!inputText.trim() || isEnhancing || isGenerating) return;
        setIsEnhancing(true);
        try {
          const prompt = `Act as an expert software architect. Take this simple app idea and expand it into a highly detailed, professional prompt for an AI code generator. Keep it under 3 sentences. Idea: "${inputText}"`;
          const enhanced = await callGemini(prompt, "You are a senior technical writer.");
          setInputText(enhanced.trim());
        } catch (e) {
          console.error("Enhancement failed:", e);
        } finally {
          setIsEnhancing(false);
        }
      };

      // ✨ LIVE Explain Logic
      const handleExplainCode = async () => {
        if (!activeCode || isExplaining || isGenerating) return;
        setIsExplaining(true);
        try {
          const prompt = `Analyze this code and explain its architecture and functionality in exactly 3 concise bullet points.\n\nCode:\n${activeCode.substring(0, 4000)}`;
          const explanationText = await callGemini(prompt, "You are a Senior Systems Engineer.");
          
          const wsToUpdate = [...workspaces];
          const targetWs = wsToUpdate.find(w => w.id === currentWorkspaceId);
          targetWs.messages.push({ role: 'ai', content: `✨ **Architecture Breakdown:**\n\n${explanationText}`, code: null });
          setWorkspaces(wsToUpdate);
        } catch (e) {
          console.error("Explanation failed:", e);
        } finally {
          setIsExplaining(false);
        }
      };

      // ✨ LIVE App Generation
      const handleSendMessage = async () => {
        if ((!inputText.trim() && attachments.length === 0) || isGenerating) return;

        let userText = inputText;
        if (attachments.length > 0) {
          const fileNames = attachments.map(a => a.name).join(', ');
          userText += `\n\n[Attached Sources: ${fileNames}]`;
        }

        setInputText('');
        setAttachments([]);
        setIsGenerating(true);
        setTerminalLogs([]);

        const updatedWorkspaces = [...workspaces];
        const wsIndex = updatedWorkspaces.findIndex(w => w.id === currentWorkspaceId);
        
        if (wsIndex !== -1) {
          if (updatedWorkspaces[wsIndex].messages.length === 0) {
            updatedWorkspaces[wsIndex].title = userText.substring(0, 20) + '...';
          }
          updatedWorkspaces[wsIndex].messages.push({ role: 'user', content: userText });
          setWorkspaces(updatedWorkspaces);
        }

        let finalResponseText = "";
        let generatedCode = "";
        const codeBlockRegex = new RegExp('`{3}(?:html)?\\s*([\\s\\S]*?)`{3}');

        try {
          if (aiMode === 'web') {
            addTerminalLog("🚀 Initiating LIVE Agentic Workflow...");
            
            addTerminalLog("🔍 Phase 1: Architecting plan using Gemini 2.5 Flash...");
            const plan = await callGemini(`Create a structured JSON software architecture for a web app requested here: "${userText}".`, "You are a software architect. Output only JSON.");
            
            addTerminalLog("✍️ Phase 2: Drafting code...");
            const draft = await callGemini(`Write a single file HTML/Tailwind app based on this architecture plan: ${plan}. Ensure it includes CSS and JS in the same file. Wrap the code in triple backticks.`, "You are an Elite Frontend Developer.");
            
            addTerminalLog("🧠 Phase 3: QA & Self-Correction...");
            const finalCode = await callGemini(`Review this drafted code. Fix any logical bugs or UI overflows. Return the perfect, finalized HTML file wrapped in triple backticks.\n\nCode:\n${draft}`, "You are an Elite QA Engineer.");
            
            const match = finalCode.match(codeBlockRegex);
            generatedCode = match ? match[1].trim() : finalCode;
            finalResponseText = "Live Agentic workflow complete. Your application has been successfully engineered.";
            
          } else if (aiMode === 'deep') {
            addTerminalLog("🧠 Generating code via Deep Think (analyzing edge cases)...");
            const res = await callGemini(`Write a complex, highly robust single file HTML/Tailwind app for: "${userText}". Wrap the code in triple backticks. Provide a brief thought process before the code.`, "You are an Expert Developer focusing on robust state management.");
            const match = res.match(codeBlockRegex);
            generatedCode = match ? match[1].trim() : res;
            finalResponseText = res.split('```')[0].trim() || "Deep analysis complete. Application generated.";
            
          } else {
            addTerminalLog("⚡ Rapidly generating code...");
            const res = await callGemini(`Write a single file HTML/Tailwind app for: "${userText}". Focus on beautiful UI. Wrap the code in triple backticks.`, "You are a fast UI prototype generator.");
            const match = res.match(codeBlockRegex);
            generatedCode = match ? match[1].trim() : res;
            finalResponseText = "Fast draft successfully generated.";
          }
        } catch (e) {
          finalResponseText = `❌ Critical Neural Link Error: ${e.message}`;
          addTerminalLog("ERROR: API connection failed.");
        }

        // Save AI Response
        const wsToUpdate = [...workspaces];
        const targetWs = wsToUpdate.find(w => w.id === currentWorkspaceId);
        targetWs.messages.push({ role: 'ai', content: finalResponseText, code: generatedCode });
        setWorkspaces(wsToUpdate);

        if (generatedCode) {
          setActiveCode(generatedCode);
          setIsArtifactOpen(true);
        }
        setIsGenerating(false);
      };

      const handleFileChange = (e) => {
        if (e.target.files && e.target.files.length > 0) {
          const newFiles = Array.from(e.target.files).map(f => ({ name: f.name, type: f.type }));
          setAttachments(prev => [...prev, ...newFiles]);
        }
        if (fileInputRef.current) fileInputRef.current.value = '';
      };

      const removeAttachment = (idx) => {
        setAttachments(prev => prev.filter((_, i) => i !== idx));
      };

      const onDragOver = (e) => { e.preventDefault(); setIsDragging(true); };
      const onDragLeave = (e) => { e.preventDefault(); setIsDragging(false); };
      const onDrop = (e) => {
        e.preventDefault(); setIsDragging(false);
        if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
          const newFiles = Array.from(e.dataTransfer.files).map(f => ({ name: f.name, type: f.type }));
          setAttachments(prev => [...prev, ...newFiles]);
        }
      };

      return (
        <div className="h-full w-full flex bg-zinc-950 font-sans relative overflow-hidden">
          
          {/* Mobile Sidebar Backdrop */}
          {isSidebarOpen && (
            <div 
              className="fixed inset-0 bg-black/60 z-30 md:hidden backdrop-blur-sm transition-opacity"
              onClick={() => setIsSidebarOpen(false)}
            />
          )}

          {/* ==================== LEFT SIDEBAR ==================== */}
          <div className={`absolute md:relative z-40 h-full ${isSidebarOpen ? 'w-64 translate-x-0' : 'w-0 -translate-x-full md:translate-x-0'} flex-shrink-0 bg-zinc-900/95 md:bg-zinc-900/50 backdrop-blur-xl border-r border-zinc-800 transition-all duration-300 ease-in-out overflow-hidden flex flex-col`}>
            <div className="h-14 flex items-center space-x-3 px-4 border-b border-zinc-800/50 flex-shrink-0">
              <ChaitrAiLogo size="sm" />
              <span className="font-bold text-lg tracking-tight bg-gradient-to-r from-white to-zinc-400 bg-clip-text text-transparent">ChaitrAi</span>
            </div>
            
            <div className="p-3 flex-shrink-0">
              <button onClick={handleCreateWorkspace} className="w-full py-2.5 px-3 rounded-lg bg-white/5 hover:bg-white/10 border border-white/5 transition-all flex items-center justify-center space-x-2 text-sm font-medium text-white">
                <Icons.Plus className="w-4 h-4" /><span>New Workspace</span>
              </button>
            </div>

            <div className="flex-1 overflow-y-auto p-2 space-y-1">
              <div className="text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2 px-2 mt-2">Saved Projects</div>
              {workspaces.map(ws => (
                <button key={ws.id} onClick={() => { setCurrentWorkspaceId(ws.id); if (window.innerWidth < 768) setIsSidebarOpen(false); }} className={`w-full text-left px-3 py-2.5 rounded-lg text-sm truncate flex items-center space-x-2 transition-colors ${currentWorkspaceId === ws.id ? 'bg-green-500/10 text-green-400 font-medium border border-green-500/20' : 'text-zinc-400 hover:bg-zinc-800/50'}`}>
                  <Icons.MessageSquare className="w-4 h-4 flex-shrink-0" /><span className="truncate">{ws.title}</span>
                </button>
              ))}
            </div>

            <div className="p-4 border-t border-zinc-800/50 flex items-center space-x-3 bg-zinc-900 flex-shrink-0">
              <div className="w-8 h-8 rounded-full bg-gradient-to-tr from-green-500 to-blue-500 flex items-center justify-center text-xs font-bold text-white shadow-inner">
                PRO
              </div>
              <div className="flex flex-col overflow-hidden">
                <span className="text-sm font-medium truncate text-white">Live AI Connected</span>
                <span className="text-xs text-green-400 truncate font-mono">Gemini 2.5 Flash</span>
              </div>
            </div>
          </div>

          {/* ==================== MIDDLE CHAT PANEL ==================== */}
          <div className="flex-1 flex flex-col relative bg-zinc-950" onDragOver={onDragOver} onDragLeave={onDragLeave} onDrop={onDrop}>
            {isDragging && (
              <div className="absolute inset-0 bg-green-500/10 backdrop-blur-[2px] z-50 flex items-center justify-center m-4 rounded-2xl border-2 border-dashed border-green-500/50">
                <div className="bg-zinc-900 border border-green-500/30 p-6 rounded-xl flex flex-col items-center space-y-3 shadow-2xl">
                  <Icons.FileDown className="w-12 h-12 text-green-400 animate-bounce" />
                  <h2 className="text-xl font-bold text-green-400">Drop files to augment context</h2>
                </div>
              </div>
            )}

            {/* Top Navbar */}
            <div className="h-14 border-b border-zinc-800/50 flex items-center justify-between px-4 bg-zinc-950/80 backdrop-blur-md sticky top-0 z-10 flex-shrink-0">
              <div className="flex items-center space-x-2">
                <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-2 rounded-md hover:bg-zinc-800 text-zinc-400 transition-colors">
                  <Icons.Menu className="w-5 h-5" />
                </button>
                <span className="font-semibold text-zinc-300 truncate max-w-[200px] sm:max-w-md">
                  {currentWorkspace?.title}
                </span>
              </div>
              
              <button 
                onClick={() => { if(activeCode) setIsArtifactOpen(!isArtifactOpen) }}
                disabled={!activeCode}
                className={`p-2 rounded-md transition-colors flex items-center space-x-2 ${activeCode ? (isArtifactOpen ? 'bg-zinc-800 text-white' : 'hover:bg-zinc-800 text-zinc-400') : 'opacity-30 cursor-not-allowed text-zinc-600'}`}
              >
                {isArtifactOpen ? <Icons.PanelRightClose className="w-5 h-5" /> : <Icons.PanelRightOpen className="w-5 h-5" />}
                <span className="text-sm font-medium hidden sm:inline">Artifact</span>
              </button>
            </div>

            {/* Chat Area */}
            <div className="flex-1 overflow-y-auto p-4 sm:p-6 space-y-6 scroll-smooth">
              {messages.length === 0 ? (
                <div className="h-full flex flex-col items-center justify-center text-center space-y-6 max-w-lg mx-auto opacity-80 animate-fade-in">
                  <ChaitrAiLogo size="lg" />
                  <h1 className="text-3xl font-bold bg-gradient-to-br from-white to-zinc-500 bg-clip-text text-transparent">
                    What shall we build?
                  </h1>
                  <p className="text-zinc-400 text-sm">
                    This AI model is developed by Arav Sharma follow on Instagram. Enter a prompt below to automatically generate, architect, and deploy real applications.
                  </p>
                </div>
              ) : (
                messages.map((msg, idx) => (
                  <div key={idx} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'} animate-fade-in`}>
                    <div className={`max-w-[85%] rounded-2xl p-4 ${msg.role === 'user' ? 'bg-zinc-800 border border-zinc-700 text-zinc-100 rounded-tr-sm' : 'bg-transparent text-zinc-300 border border-transparent'}`}>
                      {msg.role === 'ai' && (
                        <div className="flex items-center space-x-2 mb-2 text-green-400">
                          <ChaitrAiLogo size="sm" />
                          <span className="font-bold text-xs uppercase tracking-wider">ChaitrAi System</span>
                        </div>
                      )}
                      <div className="whitespace-pre-wrap leading-relaxed text-sm md:text-base">
                        {msg.content}
                      </div>
                      {msg.code && (
                        <div className="mt-4 flex items-center space-x-3 p-3 bg-zinc-900 border border-zinc-800 rounded-xl w-fit cursor-pointer hover:bg-zinc-800/80 transition-colors" onClick={() => setIsArtifactOpen(true)}>
                          <Icons.Code2 className="w-5 h-5 text-blue-400" />
                          <div className="flex flex-col pr-4">
                            <span className="text-sm font-medium text-zinc-200">View App Artifact</span>
                            <span className="text-[11px] text-zinc-500">Click to open right panel</span>
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                ))
              )}

              {/* Terminal Logs */}
              {isGenerating && (
                <div className="flex justify-start animate-fade-in">
                  <div className="max-w-[85%] rounded-xl p-4 bg-black border border-zinc-800 font-mono text-xs md:text-sm w-full shadow-lg">
                    <div className="flex items-center space-x-2 mb-3 border-b border-zinc-800 pb-2">
                      <Icons.Terminal className="w-4 h-4 text-zinc-500" />
                      <span className="text-zinc-500 font-semibold tracking-widest uppercase">Live API Terminal</span>
                      <Icons.Loader className="w-3 h-3 text-green-400 ml-auto" />
                    </div>
                    <div className="space-y-1.5 text-green-400/90">
                      {terminalLogs.map((log, i) => (
                        <div key={i} className="animate-fade-in">{log}</div>
                      ))}
                      <div className="animate-pulse flex space-x-1 items-center mt-2 h-4">
                        <span className="w-2 h-full bg-green-400 block"></span>
                      </div>
                    </div>
                  </div>
                </div>
              )}
              <div ref={messagesEndRef} />
            </div>

            {/* Input Bar */}
            <div className="p-2 sm:p-4 bg-zinc-950/80 backdrop-blur-xl border-t border-zinc-800/50 flex-shrink-0">
              <div className="max-w-4xl mx-auto flex flex-col space-y-3 bg-zinc-900 border border-zinc-700/50 rounded-2xl p-2 shadow-2xl focus-within:border-zinc-500 transition-colors">
                
                {/* AI Mode Toggles */}
                <div className="flex items-center space-x-1 p-1 bg-zinc-950/50 rounded-xl w-fit overflow-x-auto max-w-full hide-scrollbar">
                  <button onClick={() => setAiMode('fast')} className={`flex items-center space-x-1.5 px-3 py-1.5 rounded-lg text-xs font-medium transition-all flex-shrink-0 ${aiMode === 'fast' ? 'bg-zinc-800 text-white shadow-sm' : 'text-zinc-500 hover:text-zinc-300 hover:bg-zinc-800/50'}`}>
                    <Icons.Zap className="w-3.5 h-3.5 text-yellow-400" /><span className="hidden sm:inline">Fast Draft</span>
                  </button>
                  <button onClick={() => setAiMode('deep')} className={`flex items-center space-x-1.5 px-3 py-1.5 rounded-lg text-xs font-medium transition-all flex-shrink-0 ${aiMode === 'deep' ? 'bg-zinc-800 text-white shadow-sm' : 'text-zinc-500 hover:text-zinc-300 hover:bg-zinc-800/50'}`}>
                    <Icons.Brain className="w-3.5 h-3.5 text-purple-400" /><span className="hidden sm:inline">Deep Think</span>
                  </button>
                  <button onClick={() => setAiMode('web')} className={`flex items-center space-x-1.5 px-3 py-1.5 rounded-lg text-xs font-medium transition-all flex-shrink-0 ${aiMode === 'web' ? 'bg-zinc-800 text-white shadow-sm ring-1 ring-blue-500/50' : 'text-zinc-500 hover:text-zinc-300 hover:bg-zinc-800/50'}`}>
                    <Icons.Globe className="w-3.5 h-3.5 text-blue-400" />
                    <span className="bg-gradient-to-r from-blue-400 to-green-400 bg-clip-text text-transparent font-bold">Agentic Pro</span>
                  </button>
                </div>

                {/* Attachments Display */}
                {attachments.length > 0 && (
                  <div className="flex flex-wrap gap-2 px-2 pt-1 pb-2 border-b border-zinc-800/50">
                    {attachments.map((file, idx) => (
                      <div key={idx} className="flex items-center space-x-1.5 bg-zinc-800 text-zinc-300 text-xs px-2.5 py-1.5 rounded-md border border-zinc-700 animate-fade-in">
                        <Icons.FileIcon className="w-3.5 h-3.5 text-blue-400" />
                        <span className="truncate max-w-[120px]">{file.name}</span>
                        <button onClick={() => removeAttachment(idx)} className="text-zinc-500 hover:text-red-400 transition-colors ml-1">
                          <Icons.X className="w-3.5 h-3.5" />
                        </button>
                      </div>
                    ))}
                  </div>
                )}

                {/* Textarea */}
                <div className="flex items-end space-x-2 px-2 pb-1">
                  <input 
                    type="file" 
                    multiple 
                    ref={fileInputRef} 
                    onChange={handleFileChange} 
                    className="hidden" 
                  />
                  <button
                    onClick={() => fileInputRef.current?.click()}
                    title="Attach Files"
                    className="p-3 text-zinc-400 hover:text-zinc-200 hover:bg-zinc-800 rounded-xl transition-all flex-shrink-0"
                  >
                    <Icons.Paperclip className="w-4 h-4" />
                  </button>

                  <textarea
                    value={inputText}
                    onChange={(e) => setInputText(e.target.value)}
                    onKeyDown={(e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSendMessage(); } }}
                    placeholder="Describe your app architecture..."
                    className="flex-1 max-h-48 min-h-[44px] bg-transparent text-zinc-100 placeholder-zinc-500 resize-none outline-none py-2 text-sm leading-relaxed"
                    rows={1}
                  />
                  
                  <button
                    onClick={handleEnhancePrompt}
                    disabled={!inputText.trim() || isEnhancing || isGenerating}
                    title="✨ Enhance Prompt with AI"
                    className="p-3 text-purple-400 bg-purple-500/10 rounded-xl hover:bg-purple-500/20 disabled:opacity-50 disabled:cursor-not-allowed transition-all flex-shrink-0 border border-purple-500/20"
                  >
                    {isEnhancing ? <Icons.Loader className="w-4 h-4" /> : <Icons.Sparkles className="w-4 h-4" />}
                  </button>

                  <button
                    onClick={handleSendMessage}
                    disabled={(!inputText.trim() && attachments.length === 0) || isGenerating}
                    className="p-3 bg-white text-black rounded-xl hover:bg-zinc-200 disabled:opacity-50 disabled:cursor-not-allowed transition-all flex-shrink-0"
                  >
                    <Icons.Send className="w-4 h-4" />
                  </button>
                </div>
              </div>
            </div>
          </div>

          {/* ==================== RIGHT ARTIFACT PANEL ==================== */}
          {isArtifactOpen && activeCode && (
            <div className="absolute inset-0 md:relative md:inset-auto w-full md:w-[45vw] lg:w-[50vw] bg-zinc-950 border-l border-zinc-800 flex flex-col z-30 shadow-2xl transition-all">
              
              {/* Artifact Header */}
              <div className="h-14 border-b border-zinc-800 flex items-center justify-between px-2 sm:px-4 bg-zinc-900 flex-shrink-0">
                <div className="flex bg-zinc-950 p-1 rounded-lg border border-zinc-800 overflow-x-auto hide-scrollbar">
                  <button onClick={() => setArtifactTab('preview')} className={`flex items-center space-x-1 sm:space-x-2 px-2 sm:px-4 py-1.5 rounded-md text-xs font-semibold transition-all flex-shrink-0 ${artifactTab === 'preview' ? 'bg-white text-black shadow-sm' : 'text-zinc-400 hover:text-white'}`}>
                    <Icons.Play className="w-3.5 h-3.5" /><span>Preview</span>
                  </button>
                  <button onClick={() => setArtifactTab('code')} className={`flex items-center space-x-1 sm:space-x-2 px-2 sm:px-4 py-1.5 rounded-md text-xs font-semibold transition-all flex-shrink-0 ${artifactTab === 'code' ? 'bg-zinc-800 text-white shadow-sm' : 'text-zinc-400 hover:text-white'}`}>
                    <Icons.Code2 className="w-3.5 h-3.5" /><span>Code</span>
                  </button>
                </div>
                
                <div className="flex items-center space-x-1 sm:space-x-2">
                  <button 
                    onClick={handleExplainCode} 
                    disabled={isExplaining}
                    className="flex items-center space-x-1.5 px-3 py-1.5 bg-purple-500/10 hover:bg-purple-500/20 text-purple-400 border border-purple-500/20 rounded-md text-xs font-semibold transition-all disabled:opacity-50"
                  >
                    {isExplaining ? <Icons.Loader className="w-3.5 h-3.5" /> : <Icons.Sparkles className="w-3.5 h-3.5" />}
                    <span className="hidden sm:inline">Explain Logic</span>
                  </button>
                  <button onClick={() => alert("Deployment pipeline triggered! Your app is being hosted on the edge...")} className="flex items-center space-x-1.5 px-3 py-1.5 bg-green-500/10 hover:bg-green-500/20 text-green-400 border border-green-500/20 rounded-md text-xs font-semibold transition-all">
                    <Icons.Cloud className="w-3.5 h-3.5" />
                    <span className="hidden sm:inline">Deploy to Cloud</span>
                  </button>
                  <button onClick={() => setIsArtifactOpen(false)} className="text-zinc-500 hover:text-white p-1 rounded hover:bg-zinc-800 transition-colors">
                    <Icons.X className="w-5 h-5" />
                  </button>
                </div>
              </div>

              {/* Artifact Content */}
              <div className="flex-1 overflow-hidden relative">
                {artifactTab === 'preview' ? (
                  <iframe srcDoc={activeCode} title="Preview" className="w-full h-full border-none bg-white" sandbox="allow-scripts allow-forms allow-same-origin allow-modals" />
                ) : (
                  <textarea value={activeCode} readOnly className="w-full h-full bg-[#0d0d0d] text-green-400 font-mono p-6 text-sm outline-none resize-none" spellCheck={false} />
                )}
              </div>
            </div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
